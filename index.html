<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Temperatura Raspberry Pi</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        h1 { margin-bottom: 10px; color: #0056b3; }
        p { color: #666; margin-bottom: 20px; }
        table { border-collapse: collapse; width: 100%; max-width: 700px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-radius: 5px; overflow: hidden; } 
        th, td { border: 1px solid #e0e0e0; padding: 10px 14px; text-align: left; } 
        th { background-color: #0056b3; color: white; font-weight: bold; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        #error { color: #dc3545; margin-top: 15px; font-weight: bold; }
        button { background-color: #0056b3; color: white; border: none; padding: 10px 18px; cursor: pointer; border-radius: 4px; font-size: 14px; margin-bottom: 20px; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #004085; }
    </style>
</head>
<body>
    <h1>Temperatura de la RaspberryPi</h1>
    <p>Temperatura detectada a trabes del sensor </p>
    
    <button onclick="cargarDatos()">Actualitzar </button>
    
    <table id="tabla">
        <thead>
            <tr>
                <th>Data i hora:</th>
                <th>Temperatura:</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
    <div id="error"></div>

    <script>
        // Ruta relativa directa al fitxer que puja la Raspberry Pi
        const URL_JSON = "data/lectures.json";

        async function cargarDatos() {
            const tbody = document.querySelector("#tabla tbody");
            const errorDiv = document.getElementById("error");
            tbody.innerHTML = "";
            errorDiv.textContent = "";
            
            try {
                // Afegim el truc del temps per saltar-nos la cache del navegador
                const res = await fetch(URL_JSON + "?t=" + Date.now()); 
                if (!res.ok) throw new Error("Error HTTP " + res.status);
                
                const datos = await res.json();
                if (!Array.isArray(datos) || datos.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='2'>El fitxer existeix, però no té lectures guardades.</td></tr>"; 
                    return;
                }
                
                // Mostrem les últimes temperatures a dalt de tot
                datos.reverse().forEach(registro => {
                    const tr = document.createElement("tr");
                    const tdFecha = document.createElement("td");
                    tdFecha.textContent = registro.timestamp || "Sense data";
                    const tdTemp = document.createElement("td");
                    tdTemp.textContent = (registro.temperature_c !== undefined) ? registro.temperature_c + " °C" : "—";
                    
                    tr.appendChild(tdFecha);
                    tr.appendChild(tdTemp);
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error(e);
                errorDiv.textContent = "La web no pot llegir el fitxer JSON. Revisa que el fitxer a GitHub estigui exactament a la ruta 'data/lectures.json'."; 
            }
        }
        // Executa la càrrega automàticament al obrir la pàgina
        cargarDatos();
    </script>
</body>
</html>
